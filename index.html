<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#00F0FF">
  <meta name="description" content="Radio Music S O — інтернет-радіо з можливістю пошуку, улюбленими станціями та кастомними вкладками">
  <title>Radio Music S O</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
  <!-- Іконки для PWA -->
  <link rel="apple-touch-icon" sizes="180x180" href="icon-192.png">
  <link rel="icon" type="image/png" sizes="32x32" href="icon-192.png">
</head>
<body>

  <!-- Міні-плеєр (Dynamic Island / Notch стиль) -->
  <div id="miniPlayer" class="hidden">
    <div class="mini-content">
      <span class="mini-station-name">Обирайте станцію</span>
      <button class="mini-play-pause" aria-label="Play/Pause">▶</button>
    </div>
  </div>

  <div class="container">

    <!-- Кнопки керування темою та налаштуваннями -->
    <button class="theme-toggle" aria-label="Змінити тему">🌙</button>
    <button class="share-button" aria-label="Поділитися">📢</button>
    <button class="export-button" aria-label="Експортувати налаштування">📤</button>
    <button class="import-button" aria-label="Імпортувати налаштування">📥</button>
    <input type="file" id="importFileInput" accept="application/json" hidden>

    <h1>🎧 Radio Music S O</h1>

    <!-- Аудіоплеєр (прихований) -->
    <audio id="audioPlayer" preload="auto" playsinline webkit-playsinline></audio>

    <!-- Поточна станція + візуалізація + мета (назва треку) -->
    <div id="currentStationInfo">
      <div class="station-info-content">
        <div class="station-icon">🎵</div>
        <div class="station-text">
          <div class="station-name">Обирайте станцію</div>
          <div class="station-genre">жанр: —</div>
          <div class="station-country">країна: —</div>
        </div>
        <div class="wave-visualizer">
          <div class="wave-line"></div>
          <div class="wave-line"></div>
          <div class="wave-line"></div>
          <div class="wave-line"></div>
          <div class="wave-line"></div>
          <div class="wave-line"></div>
          <div class="wave-line"></div>
          <div class="wave-line"></div>
          <div class="wave-line"></div>
        </div>
      </div>
      <div id="lyricsDisplay">Завантаження інформації про трек...</div>
    </div>

    <!-- Список станцій (з підтримкою drag & drop) -->
    <div class="station-list" id="stationList"></div>

    <!-- Вкладки -->
    <div class="tabs-wrapper">
      <div class="tabs" id="tabs">
        <!-- Вкладки генеруються динамічно в script.js -->
      </div>
    </div>

    <!-- Пошук (показується тільки на вкладці Search) -->
    <div id="searchInput" style="display: none;">
      <input id="searchQuery" list="pastSearches" placeholder="Назва станції" autocomplete="off">
      <datalist id="pastSearches"></datalist>

      <input id="searchCountry" list="suggestedCountries" placeholder="Країна">
      <datalist id="suggestedCountries"></datalist>

      <input id="searchGenre" list="suggestedGenres" placeholder="Жанр">
      <datalist id="suggestedGenres"></datalist>

      <button class="search-btn" aria-label="Шукати">🔍</button>
    </div>

    <!-- Керування відтворенням -->
    <div class="controls-container">
      <div class="controls">
        <button class="control-btn" aria-label="Попередня станція">⏮</button>
        <button class="control-btn main-play-pause" aria-label="Відтворити / Пауза">▶</button>
        <button class="control-btn" aria-label="Наступна станція">⏭</button>
      </div>
    </div>

    <!-- Модальне вікно — створення нової вкладки -->
    <div class="new-tab-modal modal-overlay" style="display: none;">
      <div class="modal glass-panel">
        <h2>Нова вкладка</h2>
        <input id="newTabName" type="text" placeholder="Назва вкладки" autocomplete="off">
        <div class="modal-tabs">
          <button id="createTabBtn" class="modal-tab-btn">Створити</button>
          <button class="modal-cancel-btn">Скасувати</button>
        </div>
      </div>
    </div>

    <!-- Модальне вікно — редагування вкладки -->
    <div class="edit-tab-modal modal-overlay" style="display: none;">
      <div class="modal glass-panel">
        <h2>Редагувати вкладку</h2>
        <input id="renameTabName" type="text" placeholder="Нова назва" autocomplete="off">
        <div class="modal-tabs">
          <button id="renameTabBtn" class="modal-tab-btn">Перейменувати</button>
          <button id="deleteTabBtn" class="modal-tab-btn danger">Видалити</button>
          <button class="modal-cancel-btn">Скасувати</button>
        </div>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
