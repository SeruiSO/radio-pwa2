<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#00F0FF">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Radio Music</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div class="container">
    <!-- Top Controls -->
    <div class="top-controls">
      <button class="theme-toggle" aria-label="Toggle theme">🌙</button>
      <button class="share-button" aria-label="Share">📢</button>
      <button class="sleep-timer-btn" aria-label="Sleep timer">⏰</button>
      <button class="import-button" aria-label="Import">📥</button>
      <button class="export-button" aria-label="Export">📤</button>
    </div>

    <h1>🎧 Radio Music</h1>
    
    <!-- Audio Element -->
    <audio id="audioPlayer" preload="none" playsinline></audio>

    <!-- Loading Indicator -->
    <div id="loadingIndicator" class="loading-indicator hidden">
      <div class="spinner"></div>
      <span>Завантаження...</span>
    </div>

    <!-- Current Station Info -->
    <div id="currentStationInfo">
      <div class="station-info-content">
        <div class="station-icon">🎵</div>
        <div class="station-text">
          <div class="station-name">Обирайте станцію</div>
          <div class="station-genre">жанр: -</div>
          <div class="station-country">країна: -</div>
        </div>
        <div class="wave-visualizer">
          <div class="wave-line"></div>
          <div class="wave-line"></div>
          <div class="wave-line"></div>
          <div class="wave-line"></div>
          <div class="wave-line"></div>
          <div class="wave-line"></div>
          <div class="wave-line"></div>
          <div class="wave-line"></div>
          <div class="wave-line"></div>
        </div>
      </div>
    </div>

    <!-- Pull to refresh indicator -->
    <div id="pullIndicator" class="pull-indicator">
      <div class="pull-spinner"></div>
      <span>Потягніть для оновлення</span>
    </div>

    <!-- Station List -->
    <div class="station-list" id="stationList"></div>

    <!-- Tabs -->
    <div class="tabs-wrapper">
      <div class="tabs" id="tabs">
        <button class="tab-btn" data-tab="best">Best</button>
        <button class="tab-btn" data-tab="techno">Techno</button>
        <button class="tab-btn" data-tab="trance">Trance</button>
        <button class="tab-btn" data-tab="ukraine">UA</button>
        <button class="tab-btn" data-tab="pop">Pop</button>
        <button class="tab-btn" data-tab="search">Search</button>
        <button class="add-tab-btn" aria-label="Add tab">+</button>
      </div>
    </div>

    <!-- Search Input -->
    <div id="searchInput" style="display: none;">
      <input id="searchQuery" list="pastSearches" placeholder="Enter station name" autocomplete="off">
      <datalist id="pastSearches"></datalist>
      <input id="searchCountry" list="suggestedCountries" placeholder="Enter country" autocomplete="off">
      <datalist id="suggestedCountries"></datalist>
      <input id="searchGenre" list="suggestedGenres" placeholder="Enter genre" autocomplete="off">
      <datalist id="suggestedGenres"></datalist>
      <button class="search-btn" aria-label="Search">🔍</button>
    </div>

    <!-- Controls -->
    <div class="controls-container">
      <div class="controls">
        <button class="control-btn prev-btn" aria-label="Previous">⏮</button>
        <button class="control-btn play-btn" aria-label="Play/Pause">▶</button>
        <button class="control-btn next-btn" aria-label="Next">⏭</button>
      </div>
    </div>

    <!-- Sleep Timer Modal -->
    <div class="sleep-timer-modal modal-overlay" style="display: none;">
      <div class="modal">
        <h2>Таймер сну</h2>
        <div class="timer-options">
          <button class="timer-option" data-minutes="15">15 хв</button>
          <button class="timer-option" data-minutes="30">30 хв</button>
          <button class="timer-option" data-minutes="45">45 хв</button>
          <button class="timer-option" data-minutes="60">60 хв</button>
          <button class="timer-option" data-minutes="custom">Інше...</button>
        </div>
        <div class="custom-timer" style="display: none;">
          <input type="number" id="customMinutes" min="1" max="180" placeholder="Хвилин">
          <button class="set-custom-timer">Встановити</button>
        </div>
        <div class="active-timer" style="display: none;">
          <span id="timerDisplay">Залишилось: --:--</span>
          <button class="cancel-timer">Скасувати</button>
        </div>
        <button class="modal-cancel-btn">Закрити</button>
      </div>
    </div>

    <!-- New Tab Modal -->
    <div class="new-tab-modal modal-overlay" style="display: none;">
      <div class="modal">
        <h2>Створити нову вкладку</h2>
        <input id="newTabName" type="text" placeholder="Enter tab name" maxlength="10">
        <div class="modal-tabs">
          <button id="createTabBtn" class="modal-tab-btn">Створити</button>
          <button class="modal-cancel-btn">Відміна</button>
        </div>
      </div>
    </div>

    <!-- Edit Tab Modal -->
    <div class="edit-tab-modal modal-overlay" style="display: none;">
      <div class="modal">
        <h2>Дії з вкладкою</h2>
        <input id="renameTabName" type="text" placeholder="Enter new tab name" maxlength="10">
        <div class="modal-tabs">
          <button id="renameTabBtn" class="modal-tab-btn">Перейменувати</button>
          <button id="deleteTabBtn" class="modal-tab-btn delete">Видалити</button>
          <button class="modal-cancel-btn">Відміна</button>
        </div>
      </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Import File Input -->
    <input type="file" id="importFileInput" accept="application/json" style="display: none;">
  </div>

  <script src="script.js"></script>
</body>
</html>
